<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>内部样式表</title>
    <style>
        div {
            color: pink;
        }
    </style>
</head>

<body>
    <div>所謂內部樣式表,就是在html頁面內部寫樣式,但是是單獨寫到style標籤內部.</div>
</body>

</html>
