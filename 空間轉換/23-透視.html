<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    .box-wrap {
      perspective: 1000px;
    }

    .box {
      margin: 0 auto;
      width: 200px;
      height: 200px;
      background-color: skyblue;
      transition: all .5s;
    }

    .box:hover {
      transform: translateZ(100px);
    }
  </style>
</head>

<body>
  <div class="box-wrap">
    <div class="box"></div>
  </div>
</body>

</html>
