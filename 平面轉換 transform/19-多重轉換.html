<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    .wrap {
      width: 600px;
      height: 200px;
      border: 1px solid #666;
      margin: 0 auto;

    }

    .box {
      height: 200px;
      width: 200px;
      background-color: skyblue;

      border-radius: 50%;

      position: relative;
      overflow: hidden;
      transition: all 3s;
    }

    .box::before {
      position: absolute;

      content: '';
      width: 200px;
      height: 100px;
      background-color: yellow;
    }

    .wrap:hover .box {
      /* 旋转会改变坐标轴向 */
      transform: translate(400px) rotate(360deg);
    }
  </style>
</head>

<body>
  <div class="wrap">
    <div class="box"></div>
  </div>
</body>

</html>
