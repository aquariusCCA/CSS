<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    div {
      width: 200px;
      height: 200px;
      background-color: pink;
      margin: 100px auto;
    }

    div:hover {
      /* 1.里面写的数字不跟单位 就是倍数的意思 1就是1倍，2就是2倍 */
      transform: scale(2, 2);
    }
  </style>
</head>

<body>
  <div></div>
</body>

</html>
