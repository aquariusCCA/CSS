<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>显示模式之行内元素</title>
    <style>
        /*
        1. 常见的行内元素有<a>、<strong>、<b>、<em>、<i>、<del>、<s>、<ins>、<u>、<span>等

        2. 其中<span>标签是最典型的行内元素。有的地方也将行内元素称为内联元素
            
        3. 行內元素的特點:
            - 相邻行内元素在一行上，一行可以显示多个
            - 高，宽直接设置是无效的
            - 默认宽度就是它本身内容的宽度
            - 行内元素只能容纳文本或其他行内元素

        4. 注意 
            - 链接里面不能再放链接
            - 特殊情况链接<a>里面可以放块级元素，但是给<a>转换一下块级模式最安全
        */
        span {
            width: 100px;
            height: 100px;
            background-color: hotpink;
        }

        a {
            display: block;
        }
    </style>
</head>

<body>
    <span>pink老师你怎么穿着品如的衣服呢</span> <strong>品如的衣服</strong>
    
    <span>pink老师</span> <strong>品如的衣服</strong>

    <!-- <a href="http://www.baidu.com">
        <a href=""></a>
    </a> -->

    <a class="a" href="">
        <div></div>
    </a>
</body>

</html>
