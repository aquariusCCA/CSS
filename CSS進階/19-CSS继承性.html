    <title>CSS继承性</title>

        1. CSS中的继承：子标签会继承父标签里面的某些样式

        */
        /* div {
            color: pink;
            font-size: 14px;
        } */
        div {
            color: red;
            font-size: 12px;
        }
    </style>
</head>
